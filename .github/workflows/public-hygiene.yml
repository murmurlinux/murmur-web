name: Public hygiene

# Rejects non-public content in this repo. Public repos contain ONLY what
# ships: app code, build config, customer-facing docs, public assets.
# Anything else (design exploration, competitor research, audit reports,
# planning, scratch notes, internal docs) must live in murmurlinux/internal.
#
# Regex details: case-insensitive via `grep -iE`. Path-segment-anchored via
# `(^|/)`. Audit/competitor rule is report-shaped (either directory, or
# separator-prefix, or doc extension); code/config files like audit.toml
# are permitted. Tested against every bypass path from the 2026-04-20
# adversarial audit (see murmur-internal audits/ for report + test vectors).
#
# This workflow does not interpolate any untrusted input into shell commands.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  forbidden-paths:
    name: Reject non-public paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan tree for forbidden paths
        shell: bash
        run: |
          set -euo pipefail

          forbidden='(^|/)(design|internal|planning|scratch|mockup)([-_./]|$)|(^|/)(audit|competitor)(/|[-_][^/]*|[^/]*\.(md|markdown|txt|pdf|html|doc|docx|rst|adoc|odt)(\.[^/]+)?)|(^|/)\.(firecrawl|claude|unreleased)|(^|/)\.env(\.[^/]*)?$|(^|/)concept[-_]?[0-9]'

          hits=$(git ls-tree -r HEAD --name-only | grep -iE "$forbidden" || true)

          if [ -n "$hits" ]; then
            echo "::error::Forbidden paths found in public repo tree:"
            echo "$hits" | while read -r path; do
              echo "::error file=$path::$path is non-public content and must not be tracked here"
            done
            echo ""
            echo "Move these files to the private murmurlinux/internal repo."
            echo "See the global Public Repository Discipline for rules."
            exit 1
          fi

          echo "OK: no forbidden paths found."
