name: secret-scan

# Scans commits for leaked secrets (API keys, tokens, private keys) using
# TruffleHog OSS. Free, no license, no org restrictions. Only reports
# CONFIRMED leaks (validates each finding against the actual service).
#
# Actions are SHA-pinned to specific commits (not version tags) so an
# upstream mutable-ref compromise cannot inject malicious code. Pinned SHAs:
#   actions/checkout@v4 = 34e114876b0b11c390a56381ad16ebd13914f8d5
#   trufflesecurity/trufflehog@main = 4d2a8ef686341ee81a283d1d0fbcb97a5017ef35
# When bumping, resolve the new SHA with:
#   gh api repos/owner/repo/commits/TAG --jq '.sha'
#
# This workflow does not interpolate any untrusted input into shell commands.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trufflehog:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@4d2a8ef686341ee81a283d1d0fbcb97a5017ef35 # pinned from main 2026-04-20
        with:
          extra_args: --results=verified,unknown
