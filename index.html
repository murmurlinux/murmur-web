<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murmur — Voice Dictation for Linux</title>
<meta name="description" content="Voice dictation for Linux. 100% offline, open source, powered by whisper.cpp. Coming soon.">
<meta name="robots" content="noindex, nofollow">
<meta property="og:title" content="Murmur — Voice Dictation for Linux">
<meta property="og:description" content="Press a hotkey, speak, text at your cursor. 100% offline. Coming soon.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://murmurlinux.com">
<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
body{background:#060d18;color:rgba(255,255,255,0.4);font-family:'Sora',sans-serif}

.mesh{position:fixed;inset:0;background:linear-gradient(170deg,#0c1222 0%,#060d18 50%,#0a0f1a 100%)}
.orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:0.08}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,#14b8a6,transparent 70%);top:10%;right:15%;animation:o1 26s ease-in-out infinite}
.orb-2{width:350px;height:350px;background:radial-gradient(circle,#f59e0b,transparent 70%);bottom:5%;left:-5%;animation:o2 22s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,20px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-30px)}}

/* Glass */
.g{background:rgba(255,255,255,0.03);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.07);border-radius:10px}

/* Gradient text */
.grad{background:linear-gradient(135deg,#14b8a6,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* LED pulse */
@keyframes led{0%,100%{box-shadow:0 0 4px 1px rgba(20,184,166,0.25)}50%{box-shadow:0 0 10px 3px rgba(20,184,166,0.45)}}
.led{animation:led 1.4s ease-in-out infinite}

/* Gradient border CTA */
.cta{position:relative;border-radius:10px;padding:12px 24px;font-weight:600;color:#fff;background:#060d18;z-index:1;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:0.8rem;display:inline-flex;align-items:center;gap:0.4rem}
.cta::before{content:'';position:absolute;inset:-2px;border-radius:12px;background:conic-gradient(from var(--a,0deg),#14b8a6,#f59e0b,#14b8a6);z-index:-2;animation:sp 3s linear infinite}
.cta::after{content:'';position:absolute;inset:2px;border-radius:8px;background:#060d18;z-index:-1}
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes sp{to{--a:360deg}}

/* Blink */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.blink{animation:blink 1s step-end infinite}

/* Staggered entrance */
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.a1{animation:rise .8s cubic-bezier(.16,1,.3,1) .1s both}
.a2{animation:rise .8s cubic-bezier(.16,1,.3,1) .35s both}
.a3{animation:rise .8s cubic-bezier(.16,1,.3,1) .6s both}
.a4{animation:rise .8s cubic-bezier(.16,1,.3,1) .85s both}
.a5{animation:rise .8s cubic-bezier(.16,1,.3,1) 1.1s both}
.a6{animation:rise .8s cubic-bezier(.16,1,.3,1) 1.35s both}
.a7{animation:rise .8s cubic-bezier(.16,1,.3,1) 1.6s both}

/* Layout */
.wrap{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}

/* Footer */
.foot{position:fixed;bottom:1.5rem;left:0;right:0;text-align:center;font-size:0.6rem;color:rgba(255,255,255,0.1);font-family:'JetBrains Mono',monospace;letter-spacing:0.05em}

@media(max-width:640px){
  .hero-title{font-size:2.2rem !important}
  .badge img{width:280px !important}
  .subtitle{font-size:0.85rem !important}
  .checks{flex-direction:column;gap:0.3rem !important}
}
</style>
</head>
<body>
<div class="mesh"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <!-- LED pill -->
  <div class="a1" style="margin-bottom:1.8rem">
    <div class="g" style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.4rem 0.9rem;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:#14b8a6">
      <span class="led" style="width:6px;height:6px;border-radius:50%;background:#14b8a6;display:inline-block"></span>
      linux-native &middot; offline &middot; open-source
    </div>
  </div>

  <!-- Badge -->
  <div class="badge a2" style="margin-bottom:1.5rem">
    <img src="/body.png" alt="Murmur Comm Badge" draggable="false"
      style="width:400px;max-width:80vw;filter:drop-shadow(0 4px 40px rgba(20,184,166,0.2)) drop-shadow(0 0 80px rgba(20,184,166,0.08)) hue-rotate(-30deg);pointer-events:none;user-select:none">
  </div>

  <!-- Title -->
  <h1 class="hero-title a3" style="font-size:3rem;font-weight:800;color:rgba(255,255,255,0.92);letter-spacing:-0.025em;line-height:1.1;margin-bottom:0.8rem">
    Voice dictation<br>for Linux. <span class="grad">Finally.</span>
  </h1>

  <!-- Subtitle -->
  <p class="subtitle a4" style="font-size:0.95rem;color:rgba(255,255,255,0.4);max-width:28rem;line-height:1.6;margin-bottom:1.5rem">
    Press a hotkey, speak, text at your cursor. In any app. <span style="color:rgba(255,255,255,0.65);font-weight:500">Your voice never leaves your machine.</span>
  </p>

  <!-- Coming soon terminal line -->
  <p class="a5" style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:rgba(20,184,166,0.6);letter-spacing:0.08em;margin-bottom:1.8rem">
    <span style="color:rgba(255,255,255,0.15)">&#x276f;</span> status: <span style="color:#f59e0b">coming soon</span><span class="blink" style="color:#14b8a6"> &#x258a;</span>
  </p>

  <!-- Buttons -->
  <div class="a6" style="display:flex;gap:0.8rem;align-items:center;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem">
    <a href="https://github.com/murmurlinux/murmur" class="cta" target="_blank" rel="noopener">
      <svg style="width:14px;height:14px;fill:currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      View on GitHub
    </a>
  </div>

  <!-- Check marks -->
  <div class="checks a7" style="display:flex;gap:1.2rem;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:rgba(255,255,255,0.3)">
    <span><span style="color:#14b8a6">&#x2713;</span> 100% offline</span>
    <span><span style="color:#f59e0b">&#x2713;</span> ~3MB binary</span>
    <span><span style="color:#14b8a6">&#x2713;</span> GPL v3</span>
  </div>
</div>

<div class="foot a7">&copy; 2026 Murmur. GPL v3.</div>
</body>
</html>
